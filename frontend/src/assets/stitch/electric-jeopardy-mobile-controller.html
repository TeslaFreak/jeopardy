<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Electric Broadcast - Buzzer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-container": "#ff067f",
              "surface-container-low": "#1b0a31",
              "on-secondary": "#004d57",
              "on-error-container": "#ffd2c8",
              "background": "#150629",
              "on-surface-variant": "#b7a3cf",
              "inverse-primary": "#626200",
              "surface-dim": "#150629",
              "inverse-surface": "#fff7ff",
              "tertiary-dim": "#e30071",
              "tertiary-fixed": "#ff8eae",
              "error": "#ff7351",
              "on-tertiary": "#47001f",
              "primary": "#fffeac",
              "on-secondary-fixed-variant": "#005964",
              "on-background": "#efdfff",
              "secondary-dim": "#00d4ec",
              "surface-bright": "#372056",
              "on-tertiary-fixed-variant": "#760037",
              "on-primary-fixed-variant": "#646400",
              "primary-fixed": "#f3f300",
              "secondary-fixed-dim": "#00d7f0",
              "primary-fixed-dim": "#e4e400",
              "secondary": "#00e3fd",
              "tertiary": "#ff6b9b",
              "outline": "#806e96",
              "error-dim": "#d53d18",
              "surface-container-lowest": "#000000",
              "outline-variant": "#514166",
              "on-secondary-fixed": "#003a42",
              "on-tertiary-container": "#000000",
              "primary-dim": "#f0f000",
              "secondary-container": "#006875",
              "surface-container-highest": "#301a4d",
              "on-surface": "#efdfff",
              "on-tertiary-fixed": "#380017",
              "on-secondary-container": "#e8fbff",
              "surface-tint": "#fffeac",
              "on-error": "#450900",
              "secondary-fixed": "#26e6ff",
              "primary-container": "#f3f300",
              "on-primary-container": "#5a5a00",
              "surface-container-high": "#291543",
              "surface-variant": "#301a4d",
              "on-primary": "#626200",
              "surface-container": "#22103a",
              "surface": "#150629",
              "error-container": "#b92902",
              "on-primary-fixed": "#474700",
              "tertiary-fixed-dim": "#ff75a0",
              "inverse-on-surface": "#5e4e74"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .drop-shadow-glow {
            filter: drop-shadow(0 0 8px rgba(255, 254, 172, 0.6));
        }
        .neon-pulse {
            box-shadow: 0 0 20px rgba(0, 227, 253, 0.3);
        }
        .glass-dome {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-[#150629]/80 backdrop-blur-xl border-none bg-gradient-to-b from-[#150629] to-transparent shadow-[0_4px_30px_rgba(0,0,0,0.5)]">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-xl bg-secondary-container flex items-center justify-center overflow-hidden border border-secondary/20 shadow-[0_0_15px_rgba(0,227,253,0.2)]">
<img alt="Current Player Avatar" class="w-full h-full object-cover" data-alt="Stylized avatar of a game player" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCvXfIt8ZVl2uWi4hmCGv8NYBfDbosITygPQLXaZi9yWb4ogYhbaxUcMqPMwLji5KrkWPVLeb6vekGaEqisMfZn8GclPsEQ8hUr84B64ZKECy37rexoybd-zNrKpYHQoDovVOjdkamf_rn7m0jCldwp2dmZf65rr96IhuPsFKNFDAsjNGksMnCV1y1Em-YMmWW2Ie3_CZnH_-txFiy47xSPn0IKzZ-dwxBMiWY7AQ3r34htMeFU4g_EVQvuGFAk-QUWjgOuXFgtKgs"/>
</div>
<div class="flex flex-col">
<span class="text-[10px] font-bold uppercase tracking-widest text-secondary/60 font-label leading-none">PLAYER</span>
<span class="text-primary font-headline font-bold uppercase tracking-tight leading-none">DXTR</span>
</div>
</div>
<div class="text-center absolute left-1/2 -translate-x-1/2 md:block hidden">
<h1 class="text-2xl font-black italic tracking-tighter text-[#fffeac] drop-shadow-[0_0_10px_rgba(255,254,172,0.5)] font-headline uppercase">ELECTRIC BROADCAST</h1>
</div>
<div class="flex items-center gap-4">
<div class="flex flex-col items-end">
<span class="text-[10px] font-bold uppercase tracking-widest text-secondary/60 font-label leading-none">SCORE</span>
<span class="text-primary font-headline font-extrabold text-xl leading-none">$12,400</span>
</div>
<div class="flex gap-2">
<button class="w-8 h-8 flex items-center justify-center text-[#fffeac] hover:scale-105 transition-transform">
<span class="material-symbols-outlined" data-icon="volume_up">volume_up</span>
</button>
<button class="w-8 h-8 flex items-center justify-center text-[#fffeac] hover:scale-105 transition-transform">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</div>
</header>
<!-- Main Game Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-24 pb-32">
<!-- Context/Question Hint (Subtle) -->
<div class="mb-8 text-center max-w-xs">
<div class="inline-block px-3 py-1 rounded-full bg-surface-container-high border border-outline-variant/30 mb-2">
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-tertiary">Current Category: 8-BIT CHAOS</span>
</div>
<h2 class="text-on-surface-variant font-headline font-bold text-lg leading-tight">"The first home console to feature a directional pad..."</h2>
</div>
<!-- BUZZER MODE (Active State) -->
<div class="w-full flex flex-col items-center" id="buzzer-mode">
<button class="relative group w-72 h-72 md:w-96 md:h-96 flex items-center justify-center select-none active:scale-95 transition-transform duration-75">
<!-- Inner Glow Layers -->
<div class="absolute inset-0 bg-primary/20 rounded-full blur-3xl group-active:bg-primary/40 transition-colors"></div>
<div class="absolute inset-4 bg-primary rounded-full shadow-[0_0_60px_rgba(255,254,172,0.8)]"></div>
<!-- Main Button Body -->
<div class="absolute inset-4 rounded-full bg-gradient-to-br from-primary via-primary-fixed to-primary-fixed-dim border-4 border-white/30 flex flex-col items-center justify-center overflow-hidden">
<!-- Glass Shine Overlay -->
<div class="absolute inset-0 glass-dome"></div>
<span class="relative z-10 text-on-primary-container font-headline font-black text-6xl md:text-8xl italic tracking-tighter uppercase drop-shadow-sm">BUZZ</span>
<span class="relative z-10 text-on-primary-container/40 font-label font-bold text-xs uppercase tracking-[0.3em] mt-2">Tap to Answer</span>
</div>
</button>
</div>
<!-- RESPONSE MODE (Hidden/Demonstration of Layout) -->
<div class="hidden w-full max-w-md space-y-6" id="response-mode">
<div class="bg-surface-container-high/60 backdrop-blur-xl rounded-xl p-8 border border-outline-variant/20 shadow-2xl relative overflow-hidden">
<!-- Animated Voltage Line -->
<div class="absolute top-0 left-0 w-full h-1 bg-surface-variant">
<div class="h-full bg-gradient-to-r from-secondary to-secondary-fixed-dim w-[65%] relative">
<div class="absolute right-0 top-1/2 -translate-y-1/2 w-1.5 h-1.5 bg-white rounded-sm shadow-[0_0_8px_white]"></div>
</div>
</div>
<div class="space-y-4">
<label class="block text-[10px] font-bold uppercase tracking-widest text-secondary">Your Response</label>
<textarea class="w-full bg-surface-container-lowest border-2 border-secondary/30 rounded-lg p-4 text-xl font-headline font-bold text-primary focus:border-secondary focus:ring-0 placeholder:text-surface-variant transition-colors italic" placeholder="What is..." rows="2"></textarea>
</div>
</div>
<button class="w-full py-6 rounded-full bg-secondary text-on-secondary font-headline font-black text-2xl uppercase tracking-widest shadow-[0_10px_30px_rgba(0,227,253,0.3)] hover:scale-[1.02] active:scale-95 transition-all relative overflow-hidden">
<div class="absolute inset-0 glass-dome"></div>
                SUBMIT
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#150629]/90 backdrop-blur-2xl rounded-t-[3rem] shadow-[0_-10px_40px_rgba(0,227,253,0.15)]">
<!-- Lobby Tab -->
<a class="flex flex-col items-center justify-center text-[#00e3fd] opacity-50 hover:opacity-100 hover:drop-shadow-[0_0_8px_rgba(0,227,253,0.5)] transition-all" href="#">
<span class="material-symbols-outlined mb-1" data-icon="groups">groups</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] font-bold uppercase tracking-widest">Lobby</span>
</a>
<!-- Board Tab (Active) -->
<a class="flex flex-col items-center justify-center bg-[#fffeac] text-[#150629] rounded-full px-6 py-2 shadow-[0_0_20px_rgba(255,254,172,0.8)] animate-bounce-short" href="#">
<span class="material-symbols-outlined mb-1" data-icon="grid_view" style="font-variation-settings: 'FILL' 1;">grid_view</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] font-bold uppercase tracking-widest">Board</span>
</a>
<!-- Buzz Tab -->
<a class="flex flex-col items-center justify-center text-[#00e3fd] opacity-50 hover:opacity-100 hover:drop-shadow-[0_0_8px_rgba(0,227,253,0.5)] transition-all" href="#">
<span class="material-symbols-outlined mb-1" data-icon="sensors">sensors</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] font-bold uppercase tracking-widest">Buzz</span>
</a>
<!-- Scores Tab -->
<a class="flex flex-col items-center justify-center text-[#00e3fd] opacity-50 hover:opacity-100 hover:drop-shadow-[0_0_8px_rgba(0,227,253,0.5)] transition-all" href="#">
<span class="material-symbols-outlined mb-1" data-icon="leaderboard">leaderboard</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] font-bold uppercase tracking-widest">Scores</span>
</a>
</nav>
<!-- Background Decoration -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">
<!-- Tonal Layering Elements -->
<div class="absolute -top-24 -left-24 w-96 h-96 bg-tertiary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 -right-24 w-80 h-80 bg-secondary/10 rounded-full blur-[100px]"></div>
<!-- Subtle Scanline Effect -->
<div class="absolute inset-0 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.1)_50%),linear-gradient(90deg,rgba(255,0,0,0.02),rgba(0,255,0,0.01),rgba(0,0,255,0.02))] bg-[length:100%_4px,3px_100%]"></div>
</div>
</body></html>
